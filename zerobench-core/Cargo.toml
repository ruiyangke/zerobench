[package]
name = "zerobench-core"
description = "Core plan model, transport trait, dispatcher, and recorder for zerobench"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
default = ["runtime-compio"]
runtime-compio = ["dep:compio"]
runtime-tokio = ["dep:tokio"]

[dependencies]
# Runtime — compio (default)
compio = { workspace = true, optional = true }

# Runtime — tokio (opt-in)
tokio = { workspace = true, optional = true }

futures-util = { workspace = true }
flume = { workspace = true }
bytes = { workspace = true }
smallvec = { workspace = true }
hdrhistogram = { workspace = true }
http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
parking_lot = { workspace = true }
rand = { workspace = true }
rand_xoshiro = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
yansi = { workspace = true }
rustls = { workspace = true }
webpki-roots = { workspace = true }

[lints]
workspace = true
