[package]
name = "zerobench-http"
description = "HTTP/1/2/3 transport for zerobench, built on hyper + cyper-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
default = ["h1"]
h1 = []
h2 = ["hyper/http2"]
h3 = []   # placeholder — wires h3 + compio-quic in Phase 8

[dependencies]
zerobench-core = { workspace = true }
compio = { workspace = true }
compio-tls = { workspace = true }
futures-util = { workspace = true }
hyper = { workspace = true, features = ["http1"] }
http = { workspace = true }
httparse = { workspace = true }
cyper-core = { workspace = true }
bytes = { workspace = true }
smallvec = { workspace = true }
rustls = { workspace = true }

[lints]
workspace = true
