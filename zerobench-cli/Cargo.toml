[package]
name = "zerobench"
description = "Fast, correct, modern HTTP benchmarking tool — open-loop, HDR-precise, compio/io_uring-native"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "zerobench"
path = "src/main.rs"

[features]
default = ["h1", "sse", "ws", "runtime-compio"]
# Protocol features — flow through to zerobench-http
h1 = []
h2 = ["zerobench-http/h2"]
h3 = ["zerobench-http/h3"]
# Protocol modes
ws = ["dep:zerobench-ws"]
sse = ["dep:zerobench-sse"]
# Front-ends
tui = ["dep:zerobench-tui"]
script = ["dep:zerobench-rhai"]
# Runtime backends
runtime-compio = ["dep:compio", "zerobench-core/runtime-compio", "zerobench-http/runtime-compio"]
runtime-tokio = ["dep:tokio", "zerobench-core/runtime-tokio", "zerobench-http/runtime-tokio"]
# Raw HTTP/1.1 transport (httparse + compio, no hyper)
raw-h1 = ["zerobench-http/raw-h1"]
# Mio-based raw H1 (synchronous epoll, no async runtime)
mio-h1 = ["zerobench-http/mio-h1"]
# Everything
all = ["h2", "h3", "ws", "sse", "tui", "script"]

[dependencies]
zerobench-core = { workspace = true, default-features = false }
zerobench-http = { workspace = true, default-features = false, features = ["h1"] }
zerobench-ws = { workspace = true, optional = true }
zerobench-sse = { workspace = true, optional = true }
zerobench-rhai = { workspace = true, optional = true }
zerobench-tui = { workspace = true, optional = true }

bytes = { workspace = true }
clap = { workspace = true }
mimalloc = { workspace = true }
http = { workspace = true }
serde_json = { workspace = true }
smallvec = { workspace = true }
thiserror = { workspace = true }
yansi = { workspace = true }

# Runtime — compio (default)
compio = { workspace = true, optional = true }
# Runtime — tokio (opt-in)
tokio = { workspace = true, optional = true }

[dev-dependencies]
hyper = { workspace = true, features = ["http1", "http2", "server"] }
http-body-util = { workspace = true }
bytes = { workspace = true }
compio = { workspace = true }
cyper-core = { workspace = true }
futures-util = { workspace = true }
httparse = { workspace = true }
zerobench-ws = { workspace = true }
compio-tls = { workspace = true }
rustls = { workspace = true }
rcgen = { workspace = true }

[lints]
workspace = true
